[package]
name = "axum_back"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.7.9"
dotenvy = "0.15.7"
once_cell = "1.20.2"
sea-orm = { version = "1.1.3", features = ["sqlx-mysql", "runtime-tokio-rustls", "macros"] }
serde = "1.0.216"
tokio = { version = "1.42.0", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6.2", features = ["cors"] }
